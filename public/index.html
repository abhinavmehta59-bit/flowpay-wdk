<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowPay — AI Agent Wallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0b0f;
      --bg-secondary: #11131a;
      --bg-tertiary: #1a1d29;
      --bg-card: #151821;
      --border: #2a2e3d;
      --border-hover: #3a3f52;
      --text-primary: #ffffff;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --accent-purple: #8b5cf6;
      --accent-blue: #3b82f6;
      --accent-green: #10b981;
      --gradient-primary: linear-gradient(135deg, #8b5cf6 0%, #3b82f6 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      position: fixed;
      height: 100vh;
      padding: 24px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 44px;
      height: 44px;
      background: var(--gradient-primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .logo-text { font-size: 22px; font-weight: 800; }
    .logo-text span { color: var(--accent-purple); }
    .nav-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      transition: all 0.2s;
    }
    .nav-item:hover, .nav-item.active {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    .main {
      flex: 1;
      margin-left: 280px;
      padding: 32px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .header-title { font-size: 32px; font-weight: 800; }
    .header-subtitle { color: var(--text-secondary); margin-top: 4px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--gradient-primary);
      color: white;
    }
    .btn-primary:hover { transform: translateY(-1px); }
    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }
    .card-gradient {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(59, 130, 246, 0.1) 100%);
      border-color: rgba(139, 92, 246, 0.3);
    }
    .balance-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .balance-amount { font-size: 40px; font-weight: 800; margin: 8px 0; }
    .skeleton {
      background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--border) 50%, var(--bg-tertiary) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-purple);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 1000;
    }
    .toast {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 300px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .toast.success { border-left: 3px solid var(--accent-green); }
    .toast.error { border-left: 3px solid #ef4444; }
    .setup-container {
      max-width: 480px;
      margin: 60px auto;
      text-align: center;
    }
    .setup-icon-large {
      width: 100px;
      height: 100px;
      background: var(--gradient-primary);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin: 0 auto 32px;
    }
    .input {
      width: 100%;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      color: var(--text-primary);
      font-size: 15px;
      margin-bottom: 12px;
    }
    .input:focus {
      outline: none;
      border-color: var(--accent-purple);
    }
    .hidden { display: none !important; }
    @media (max-width: 1024px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .balance-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">⚡</div>
        <div class="logo-text">Flow<span style="color: var(--accent-purple);">Pay</span></div>
      </div>
      <div class="nav-label">Wallet</div>
      <a class="nav-item active" onclick="showScreen('dashboard')">📊 Dashboard</a>
      <a class="nav-item" onclick="showScreen('send')">📤 Send</a>
      <div class="nav-label" style="margin-top: 24px;">AI Features</div>
      <a class="nav-item" onclick="showScreen('mcp')">🔮 MCP Toolkit</a>
      <a class="nav-item" onclick="showScreen('x402')">⚡ x402</a>
    </aside>

    <main class="main">
      <div class="toast-container" id="toast-container"></div>

      <!-- Setup -->
      <div id="setup-screen" class="setup-container">
        <div class="setup-icon-large">🪄</div>
        <h1 style="font-size: 32px; font-weight: 800; margin-bottom: 12px;">Welcome to FlowPay</h1>
        <p style="color: var(--text-secondary); margin-bottom: 40px;">Your AI-powered agent wallet</p>
        <button class="btn btn-primary" style="width: 100%; margin-bottom: 12px;" onclick="createWallet()" id="create-btn">
          <span class="spinner hidden" id="create-spinner"></span>
          <span id="create-text">Create New Wallet</span>
        </button>
        <button class="btn btn-secondary" style="width: 100%;" onclick="toggleImport()">Import Existing</button>
        <div id="import-section" class="hidden" style="margin-top: 24px;">
          <input type="text" class="input" id="seed-input" placeholder="12-word seed phrase...">
          <button class="btn btn-primary" style="width: 100%;" onclick="importWallet()">Import</button>
        </div>
      </div>

      <!-- Dashboard -->
      <div id="dashboard-screen" class="hidden">
        <div class="header">
          <div>
            <h1 class="header-title">Dashboard</h1>
            <p class="header-subtitle">Manage your AI agent wallet</p>
          </div>
          <button class="btn btn-primary" onclick="showScreen('send')">+ Send</button>
        </div>
        <div class="balance-grid">
          <div class="card card-gradient">
            <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">USDT Balance</div>
            <div class="balance-amount" id="usdt-balance">
              <div class="skeleton" style="width: 120px; height: 48px;"></div>
            </div>
            <div style="color: var(--accent-green); font-size: 14px;">● Arbitrum One</div>
          </div>
          <div class="card">
            <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">ETH Balance</div>
            <div class="balance-amount" id="eth-balance" style="color: var(--accent-purple);">
              <div class="skeleton" style="width: 100px; height: 48px;"></div>
            </div>
            <div style="color: var(--text-secondary); font-size: 14px;">For gas fees</div>
          </div>
          <div class="card">
            <div style="font-size: 14px; color: var(--text-secondary); margin-bottom: 8px;">Status</div>
            <div class="balance-amount" style="font-size: 28px; color: var(--accent-green);">✅ Active</div>
            <div style="color: var(--text-secondary); font-size: 14px;">ERC-4337 Gasless</div>
          </div>
        </div>
      </div>

      <!-- Send -->
      <div id="send-screen" class="hidden">
        <div class="header">
          <div>
            <h1 class="header-title">Send USDT</h1>
            <p class="header-subtitle">Gasless transfers</p>
          </div>
        </div>
        <div class="card" style="max-width: 600px;">
          <input type="text" class="input" id="send-to" placeholder="Recipient address (0x...)">
          <input type="number" class="input" id="send-amount" placeholder="Amount (USDT)">
          <button class="btn btn-primary" style="width: 100%;" onclick="sendPayment()">
            <span class="spinner hidden" id="send-spinner"></span>
            <span id="send-text">⚡ Send Gaslessly</span>
          </button>
          <div id="send-result" style="margin-top: 16px;"></div>
        </div>
      </div>
    </main>
  </div>

  <script>
    let wallet = null;
    let currentScreen = 'setup';

    function showScreen(screen) {
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      event.target.classList.add('active');
      
      ['setup-screen', 'dashboard-screen', 'send-screen'].forEach(id => {
        document.getElementById(id).classList.add('hidden');
      });
      document.getElementById(screen + '-screen').classList.remove('hidden');
      currentScreen = screen;
    }

    function toggleImport() {
      document.getElementById('import-section').classList.toggle('hidden');
    }

    function showToast(title, message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <div style="font-size: 20px;">${type === 'success' ? '✅' : '❌'}</div>
        <div>
          <div style="font-weight: 600;">${title}</div>
          <div style="font-size: 13px; color: var(--text-secondary);">${message}</div>
        </div>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 5000);
    }

    async function createWallet() {
      const btn = document.getElementById('create-btn');
      const spinner = document.getElementById('create-spinner');
      const text = document.getElementById('create-text');
      
      spinner.classList.remove('hidden');
      text.textContent = 'Creating...';
      btn.disabled = true;
      
      try {
        const r = await fetch('/api/wallet/create', { method: 'POST' });
        const d = await r.json();
        if (d.error) throw new Error(d.error);
        wallet = d;
        showToast('Wallet Created', 'Your agent wallet is ready!');
        loadDashboard();
      } catch (e) {
        showToast('Error', e.message, 'error');
      } finally {
        spinner.classList.add('hidden');
        text.textContent = 'Create New Wallet';
        btn.disabled = false;
      }
    }

    async function importWallet() {
      const seed = document.getElementById('seed-input').value.trim();
      try {
        const r = await fetch('/api/wallet/load', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ seed })
        });
        const d = await r.json();
        if (d.error) throw new Error(d.error);
        wallet = d;
        showToast('Wallet Imported', 'Welcome back!');
        loadDashboard();
      } catch (e) {
        showToast('Error', e.message, 'error');
      }
    }

    function loadDashboard() {
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('dashboard-screen').classList.remove('hidden');
      refreshBalances();
    }

    async function refreshBalances() {
      if (!wallet) return;
      try {
        const r = await fetch(`/api/balance/${wallet.addresses.smartWallet}`);
        const d = await r.json();
        document.getElementById('usdt-balance').textContent = parseFloat(d.USDT).toFixed(2);
        document.getElementById('eth-balance').textContent = parseFloat(d.ETH).toFixed(4);
      } catch (e) {
        console.error(e);
      }
    }

    async function sendPayment() {
      const to = document.getElementById('send-to').value;
      const amount = document.getElementById('send-amount').value;
      const spinner = document.getElementById('send-spinner');
      const text = document.getElementById('send-text');
      const resultEl = document.getElementById('send-result');
      
      spinner.classList.remove('hidden');
      text.textContent = 'Sending...';
      
      try {
        const r = await fetch('/api/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to, amount })
        });
        const d = await r.json();
        if (d.error) throw new Error(d.error);
        resultEl.innerHTML = `✅ Sent! <a href="${d.explorerUrl}" target="_blank" style="color: var(--accent-green);">View tx</a>`;
        showToast('Success', 'Transaction sent!');
        refreshBalances();
      } catch (e) {
        resultEl.innerHTML = `❌ ${e.message}`;
        showToast('Error', e.message, 'error');
      } finally {
        spinner.classList.add('hidden');
        text.textContent = '⚡ Send Gaslessly';
      }
    }

    // Auto-load on startup
    fetch('/api/status').then(r => r.json()).then(d => {
      if (d.walletLoaded && d.smartWallet) {
        wallet = { addresses: { smartWallet: d.smartWallet } };
        loadDashboard();
      }
    }).catch(console.error);
  </script>
</body>
</html>
